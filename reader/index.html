<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦鬼 · 剧本阅读器</title>
<style>
  :root {
    --bg: #0e0e10;
    --sidebar: #141416;
    --border: #2a2a2e;
    --accent: #c8a96e;
    --text: #d4cfc8;
    --muted: #666;
    --code-bg: #1a1a1e;
    --active: #c8a96e22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', 'Source Han Serif CN', '宋体', serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── 侧边栏 ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h1 {
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 4px;
    font-weight: normal;
  }
  #sidebar-header p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 1px;
  }
  #nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  #nav::-webkit-scrollbar { width: 4px; }
  #nav::-webkit-scrollbar-track { background: transparent; }
  #nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .nav-group { margin-bottom: 4px; }
  .nav-group-title {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    padding: 10px 16px 4px;
    text-transform: uppercase;
  }
  .nav-item {
    display: block;
    padding: 8px 16px;
    font-size: 13px;
    color: #999;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .nav-item:hover { color: var(--text); background: var(--active); }
  .nav-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--active);
  }

  /* ── 内容区 ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #topbar {
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }
  #topbar span { color: var(--accent); }
  #content-area {
    flex: 1;
    overflow-y: auto;
    padding: 36px 60px 60px;
  }
  #content-area::-webkit-scrollbar { width: 6px; }
  #content-area::-webkit-scrollbar-track { background: transparent; }
  #content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Markdown 渲染样式 ── */
  .md h1 {
    font-size: 26px;
    color: var(--accent);
    font-weight: normal;
    letter-spacing: 4px;
    margin: 0 0 8px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .md h2 {
    font-size: 18px;
    color: #d4b97a;
    font-weight: normal;
    letter-spacing: 2px;
    margin: 36px 0 12px;
    padding-left: 10px;
    border-left: 3px solid var(--accent);
  }
  .md h3 {
    font-size: 15px;
    color: #b0a890;
    font-weight: bold;
    margin: 28px 0 8px;
    letter-spacing: 1px;
  }
  .md p {
    line-height: 2;
    margin: 8px 0;
    font-size: 14.5px;
  }
  .md blockquote {
    border-left: 3px solid #4a4a4e;
    padding: 6px 16px;
    margin: 12px 0;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }
  .md pre, .md code {
    font-family: 'Consolas', 'Courier New', monospace;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px;
    color: #b8c0a8;
  }
  .md pre {
    padding: 14px 18px;
    margin: 12px 0;
    overflow-x: auto;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .md code { padding: 1px 5px; }
  .md pre code { background: none; border: none; padding: 0; }
  .md strong { color: #e8dfc8; font-weight: bold; }
  .md em { color: #a89878; font-style: italic; }
  .md hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }
  .md ul, .md ol {
    padding-left: 24px;
    margin: 8px 0;
    line-height: 2;
    font-size: 14.5px;
  }
  .md li { margin: 2px 0; }
  .md table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 13.5px;
  }
  .md th {
    background: var(--code-bg);
    color: var(--accent);
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: left;
    font-weight: normal;
    letter-spacing: 1px;
  }
  .md td {
    padding: 7px 12px;
    border: 1px solid var(--border);
    line-height: 1.6;
  }
  .md tr:nth-child(even) td { background: #13131580; }

  /* 角色对话美化 */
  .md p:has-text, .dialogue { }

  #loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 2px;
  }

  /* 欢迎页 */
  #welcome {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }
  #welcome h2 {
    font-size: 32px;
    color: var(--accent);
    font-weight: normal;
    letter-spacing: 8px;
    margin-bottom: 16px;
  }
  #welcome p { line-height: 2; font-size: 14px; }
  #welcome .hint { margin-top: 40px; font-size: 12px; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>梦 鬼</h1>
    <p>DREAMGHOST · 剧本档案</p>
  </div>
  <div id="nav">
    <div class="nav-group">
      <div class="nav-group-title">设定档案</div>
      <div class="nav-item" onclick="load('设定档案/梦鬼_世界观与机制.md','世界观与机制')">世界观与宿主机制</div>
      <div class="nav-item" onclick="load('设定档案/梦鬼_游戏规则与空间机制.md','游戏规则与空间机制')">游戏规则与空间机制</div>
      <div class="nav-item" onclick="load('设定档案/梦鬼_角色档案.md','角色档案')">角色档案</div>
      <div class="nav-item" onclick="load('设定档案/梦鬼_游戏形式与风格.md','游戏形式与风格')">游戏形式与风格</div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">剧本 · 时间轴A（2000年）</div>
      <div class="nav-item" onclick="load('剧本/时间轴A_序章+Chapter1-2.md','序章 + Chapter 1-2')">序章 · Chapter 1-2</div>
      <div class="nav-item" onclick="load('剧本/时间轴A_Chapter3-5+结局.md','Chapter 3-5 + 三结局')">Chapter 3-5 · 三结局</div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">剧本 · 时间轴B（2026年）</div>
      <div class="nav-item" onclick="load('剧本/时间轴B_外层Meta流程+反转节点.md','外层Meta流程 + 七反转节点')">外层Meta流程 · 七反转节点</div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">方案文档</div>
      <div class="nav-item" onclick="load('游戏剧本写作可执行方案.md','可执行方案')">游戏剧本写作可执行方案</div>
    </div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <span id="breadcrumb">梦鬼档案库</span>
    &nbsp;·&nbsp; 点击左侧目录开始阅读
  </div>
  <div id="content-area">
    <div id="welcome">
      <h2>梦 鬼</h2>
      <p>DREAMGHOST · 剧本档案库</p>
      <p style="margin-top:24px;">选择左侧任意文件开始阅读</p>
      <div class="hint">
        设定档案 / 角色档案 / 剧本全文 / Meta演出设计
      </div>
    </div>
    <div id="md-output" class="md" style="display:none;"></div>
  </div>
</div>

<script>
// 极简 Markdown 渲染器
function renderMD(text) {
  let html = text
    // 转义HTML特殊字符（在code块之外）
    // 先提取所有 code 块保护
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // 恢复 blockquote 的 >
  // 代码块（围栏式）
  html = html.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => {
    return `<pre><code>${code.trimEnd()}</code></pre>`;
  });

  // 标题
  html = html.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
  html = html.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
  html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

  // 水平线
  html = html.replace(/^---+$/gm, '<hr>');

  // 粗体斜体
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // 行内代码
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // 表格
  html = html.replace(/((?:^\|.+\|\n?)+)/gm, (block) => {
    const rows = block.trim().split('\n');
    let out = '<table>';
    rows.forEach((row, i) => {
      if (/^\|[-|\s]+\|$/.test(row)) return;
      const cells = row.split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1);
      if (i === 0) {
        out += '<tr>' + cells.map(c => `<th>${c.trim()}</th>`).join('') + '</tr>';
      } else if (!/^[-\s|]+$/.test(row)) {
        out += '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
      }
    });
    out += '</table>';
    return out;
  });

  // blockquote
  html = html.replace(/^&gt;\s?(.+)$/gm, '<blockquote>$1</blockquote>');

  // 无序列表
  html = html.replace(/((?:^[-*+]\s.+\n?)+)/gm, (block) => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^[-*+]\s/, '').trim()}</li>`).join('');
    return `<ul>${items}</ul>`;
  });

  // 有序列表
  html = html.replace(/((?:^\d+\.\s.+\n?)+)/gm, (block) => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^\d+\.\s/, '').trim()}</li>`).join('');
    return `<ol>${items}</ol>`;
  });

  // 段落：连续行合并，空行分段
  html = html.replace(/\n{2,}/g, '\n§BREAK§\n');
  html = html.replace(/\n/g, ' ');
  html = html.split('§BREAK§').map(block => {
    block = block.trim();
    if (!block) return '';
    if (/^<(h[1-6]|ul|ol|table|pre|hr|blockquote)/.test(block)) return block;
    return `<p>${block}</p>`;
  }).join('\n');

  return html;
}

let currentItem = null;

function load(path, title) {
  // 更新激活状态
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');

  document.getElementById('breadcrumb').textContent = title;
  document.getElementById('welcome').style.display = 'none';
  const out = document.getElementById('md-output');
  out.style.display = 'block';
  out.innerHTML = '<div id="loading">加载中……</div>';

  fetch('../' + path)
    .then(r => {
      if (!r.ok) throw new Error('文件不存在');
      return r.text();
    })
    .then(text => {
      out.innerHTML = renderMD(text);
      document.getElementById('content-area').scrollTop = 0;
    })
    .catch(err => {
      out.innerHTML = `<p style="color:#c06060;">无法加载文件：${path}<br><small>${err.message}</small></p>`;
    });
}
</script>
</body>
</html>
